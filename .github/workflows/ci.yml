name: ci

on:
  push:
    branches: [master]
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            out: lenv-windows-amd64.exe
          - goos: linux
            goarch: amd64
            out: lenv-linux-amd64
          - goos: linux
            goarch: arm64
            out: lenv-linux-arm64
          - goos: darwin
            goarch: amd64
            out: lenv-darwin-amd64
          - goos: darwin
            goarch: arm64
            out: lenv-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.out }} .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.out }}
